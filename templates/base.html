<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}algoitni{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(251,191,36,0.16),_transparent_30%),linear-gradient(180deg,_#111827_0%,_#020617_100%)] text-stone-100">
    <div class="mx-auto max-w-6xl px-6 py-8">
      <header class="mb-10 flex items-center justify-between border-b border-white/10 pb-4">
        <div>
          <a href="{{ url_for('index') }}" class="text-2xl font-semibold tracking-tight text-amber-300">algoitni</a>
          <p class="mt-1 text-sm text-stone-400">대표 구현 1개를 중심으로 학습 흐름을 고정하는 알고리즘 학습 MVP</p>
        </div>
        <div class="rounded-full border border-amber-300/20 bg-amber-300/10 px-3 py-1 text-xs text-amber-200">
          role 2 · lesson/ui
        </div>
      </header>
      {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
